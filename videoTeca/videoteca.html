<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Últimos Videos</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      max-width: 1140px;
      margin: 36px auto;
      padding: 28px 36px;
      background: #0d0d0d;
      border: 2px solid #0095ff;
      color: #ffffff;
    }

    .section-header {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }

    .section-line {
      position: relative;
      margin-top: 12px;
      height: 1px;
      background: rgba(255, 255, 255, 0.55);
    }

    .section-line::before {
      content: "";
      position: absolute;
      left: 0;
      top: -1px;
      width: 24px;
      height: 3px;
      background: #d60000;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .video-card {
      cursor: pointer;
    }

    .video-thumb {
      position: relative;
      width: 100%;
      height: 205px;
      overflow: hidden;
      background: #000;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }

    .video-card:hover .video-thumb img {
      transform: scale(1.05);
    }

    .video-thumb::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.85),
        rgba(0, 0, 0, 0.15),
        rgba(0, 0, 0, 0)
      );
    }

    .video-title {
      margin-top: 14px;
      min-height: 48px;
      font-size: 16px;
      line-height: 1.28;
      font-weight: 800;
      color: #ffffff;
    }

    .video-meta {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      font-family: monospace;
    }

    .play-btn {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #ffffff;
    }

    .dots {
      margin-top: 42px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
    }

    .dot.active {
      background: #d60000;
    }

    .empty-message,
    .error-message {
      grid-column: 1 / -1;
      color: #ffffff;
      font-size: 15px;
      padding: 20px 0;
    }

    @media (max-width: 900px) {
      .container {
        margin: 20px auto;
        padding: 22px;
      }

      .videos-grid {
        grid-template-columns: 1fr;
        gap: 28px;
      }

      .video-thumb {
        height: 220px;
      }
    }
  </style>
</head>

<body>

  <section class="container">
    <div class="section-header">
      <div class="section-title">ÚLTIMOS VIDEOS &gt;</div>
      <div class="section-line"></div>
    </div>

    <div class="videos-grid" id="videoGrid"></div>

    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot active"></span>
      <span class="dot"></span>
    </div>
  </section>

  <script>
    const playlistId = "x9si9u";
    const grid = document.getElementById("videoGrid");

    function formatDuration(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = String(seconds % 60).padStart(2, "0");
      return `${min}:${sec}`;
    }

    function sendIframeHeight() {
      const height = document.documentElement.scrollHeight;
      parent.postMessage({ type: "resize-iframe", height }, "*");
    }

    fetch(`https://api.dailymotion.com/playlist/${playlistId}/videos?fields=id,title,thumbnail_720_url,thumbnail_480_url,thumbnail_240_url,duration&limit=3`)
      .then(res => res.json())
      .then(data => {
        if (!data.list || data.list.length === 0) {
          grid.innerHTML = `<p class="empty-message">No hay videos disponibles.</p>`;
          sendIframeHeight();
          return;
        }

        data.list.forEach(video => {
          const img =
            video.thumbnail_720_url ||
            video.thumbnail_480_url ||
            video.thumbnail_240_url;

          const card = document.createElement("article");
          card.className = "video-card";

          card.innerHTML = `
            <div class="video-thumb">
              <img src="${img}" alt="${video.title}">
            </div>

            <h3 class="video-title">${video.title}</h3>

            <div class="video-meta">
              <span class="play-btn">▶</span>
              <span>${formatDuration(video.duration)}</span>
            </div>
          `;

          card.addEventListener("click", () => {
            window.open(`https://www.dailymotion.com/video/${video.id}`, "_blank");
          });

          grid.appendChild(card);
        });

        sendIframeHeight();
      })
      .catch(error => {
        console.error(error);
        grid.innerHTML = `<p class="error-message">Error al cargar videos.</p>`;
        sendIframeHeight();
      });

    window.addEventListener("load", sendIframeHeight);
    window.addEventListener("resize", sendIframeHeight);
  </script>

</body>

</html>
