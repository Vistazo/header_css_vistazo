<style>

  display: flex;

  height: 60px;
  width: auto;
  max-width: 180px;
  object-fit: contain;
  opacity: 1;
}
</style>

<script>
(function () {
  const VISTAZO_CSS = `
    body,
    body.auto-dark-mode,
    #mainContent,
    .container,
    #widget,
    .widget-bracket {
      background: #ffffff !important;
      color: #111111 !important;
    }

    .widget-bracket,
    .widget-bracket main,
    .widget-bracket header {
      background: #ffffff !important;
      color: #111111 !important;
    }

    .widget-bracket * {
      color: #111111 !important;
      border-color: #dcdcdc !important;
      background-color: #ffffff !important;
    }

    .widget-bracket svg,
    .widget-bracket svg * {
      background-color: transparent !important;
    }

    .widget-bracket button,
    .widget-bracket [role="tab"] {
      background: #f4f4f4 !important;
      color: #111111 !important;
      border: 1px solid #d6d6d6 !important;
      border-radius: 22px !important;
      font-weight: 800 !important;
      text-transform: uppercase !important;
    }

    .widget-bracket button[aria-selected="true"],
    .widget-bracket [role="tab"][aria-selected="true"],
    .widget-bracket button:first-child {
      background: #1c0487 !important;
      color: #ffffff !important;
      border-color: #1c0487 !important;
    }

    .widget-bracket svg path,
    .widget-bracket svg line,
    .widget-bracket svg polyline {
      stroke: #bdbdbd !important;
    }

    .widget-bracket svg rect {
      fill: #ffffff !important;
      stroke: #dcdcdc !important;
    }

    .widget-bracket time,
    .widget-bracket small {
      color: #555555 !important;
    }

    .widget-bracket img {
      background: transparent !important;
    }

    ::-webkit-scrollbar {
      height: 8px;
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f3f3f3;
    }

    ::-webkit-scrollbar-thumb {
      background: #c8c8c8;
      border-radius: 8px;
    }
  `;

  function applyVistazoTheme() {
    const iframes = document.querySelectorAll('iframe');

    iframes.forEach(function (iframe) {
      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;

        if (!doc || doc.getElementById('vistazo-gracenote-theme')) return;

        const style = doc.createElement('style');
        style.id = 'vistazo-gracenote-theme';
        style.innerHTML = VISTAZO_CSS;

        doc.head.appendChild(style);
      } catch (error) {
        console.warn('No se pudo aplicar CSS dentro del iframe de Gracenote:', error);
      }
    });
  }

  window.addEventListener('load', function () {
    applyVistazoTheme();

    let tries = 0;
    const interval = setInterval(function () {
      applyVistazoTheme();
      tries++;

      if (tries >= 20) {
        clearInterval(interval);
      }
    }, 400);
  });
})();
</script>
